<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form action="" method="post">
		<label for="name">Name:</label>
		<input type="text" required id="name" placeholder="Name">
		<br><br>
		<label for="email">Email: </label>
		<input type="email" required id="email" placeholder="Email">
		<br><br>
		<label>Gender: </label>
		<input type="radio" required value="male" id="gender_m" name="gender">Male
		<input type="radio" required value="female" id="gender_f" name="gender">Female
		<br><br>
		<label>Car Brands: </label>
		<select type="select" required id="cars" placeholder="--Please choose an option--">
			<option>Car1</option>
			<option>Car2</option>
			<option>Car3</option>
		</select>
		<br><br>
		<label for="age">Age: </label>
		<input type="number" required id="age" placeholder="Age">
		<br><br>
		<label id="dob">DOB:</label>
		<input type="date" required id="dob">
		<br><br>
		<label id="tel">Phone Number: </label>
		<input type="tel" id="tel" placeholder="xxx-xxx-xxx">
		<br><br>
		<label for="password">Password: </label>
		<input type="password" id="password" required placeholder="Password">
		<br><br>
		<label for="tos">I agree to the TOS:</label>
		<input type="checkbox" required id="tos">
		<br><br>
		<button type="submit">Submit</button>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
